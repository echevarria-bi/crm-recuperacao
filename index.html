<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Painel de Recuperação - Tele Vendas</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0b0d14;color:#e1e7ef}
    header{background:linear-gradient(135deg,#11131c,#1a1d27);border-bottom:1px solid #1e1b4b;padding:20px 32px;display:flex;align-items:center;flex-wrap:wrap;gap:8px}
    header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#f59e0b,#fb923c,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.5px}
    .container{max-width:1200px;margin:0 auto;padding:24px 32px}
    .upload-area{display:block;border:2px dashed #1e1b4b;border-radius:16px;padding:56px;text-align:center;background:linear-gradient(135deg,#11131c,#1a1d27);cursor:pointer;transition:.3s}
    .upload-area:hover{border-color:#f59e0b;background:linear-gradient(135deg,#151830,#1e2030)}
    .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
    .top-bar .info{font-size:13px;color:#4a4d6e}
    .top-bar label{color:#9ca3af;font-size:13px;font-weight:500}
    .tabs-group{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#11131c,#1a1d27);border:1px solid #1e1b4b;border-radius:12px;padding:7px 12px;margin-bottom:22px;flex-wrap:wrap}
    .tabs{display:flex;align-items:center;gap:3px}
    .tab-divider{width:1px;height:28px;background:linear-gradient(to bottom,transparent,#4a4d6e,transparent);margin:0 6px;flex-shrink:0}
    .tab-btn{padding:8px 18px;border:none;border-radius:8px;background:transparent;color:#6b7280;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap;letter-spacing:.2px}
    .tab-btn:hover{color:#e1e7ef;background:rgba(255,255,255,.04)}
    .tab-btn.active{color:#fcd34d;background:linear-gradient(135deg,rgba(120,53,15,.35),rgba(69,25,3,.35));border:1px solid rgba(245,158,11,.3);box-shadow:0 0 14px rgba(245,158,11,.07)}
    .tab-month{color:#4a4d6e;padding:6px 14px;font-size:11.5px;text-transform:uppercase;letter-spacing:.8px;font-weight:700}
    .tab-month:hover{color:#c4c9d4;background:rgba(255,255,255,.03)}
    .tab-month.active{color:#a78bfa;background:transparent;border:none;border-bottom:2.5px solid #a78bfa;border-radius:0;padding:6px 14px 3.5px;box-shadow:none}
    .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
    .card{background:linear-gradient(135deg,#11131c,#1a1d27);border:1px solid #1e1b4b;border-radius:14px;padding:20px 24px;transition:.2s}
    .card:hover{border-color:#f59e0b;transform:translateY(-1px);box-shadow:0 4px 20px rgba(245,158,11,.08)}
    .card .label{font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:5px}
    .card .value{font-size:26px;font-weight:800;margin-top:3px;color:#f0f2f8;line-height:1.2}
    .card .sub{font-size:11px;color:#d1d5db;margin-top:5px}
    .var-up{color:#34d399}
    .var-down{color:#f87171}
    .meta-color{color:#fcd34d}
    .realizado-color{color:#34d399}
    .col-ranking{width:48px;text-align:center;color:#4a4d6e}
    .col-gap{width:80px;text-align:right}
    .badge-sm{padding:1px 8px;border-radius:3px;font-size:10px;font-weight:700;display:inline-block;white-space:nowrap}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
    .grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px}
    .grid-5 .card,.cards .card{display:flex;flex-direction:column;justify-content:center}
    .grid-5 .card .value,.cards .card .value{margin-top:0}
    @media(max-width:768px){.grid-2,.grid-4,.grid-5,.cards{grid-template-columns:1fr}.container{padding:16px}}
    .chart-box{background:linear-gradient(135deg,#11131c,#1a1d27);border:1px solid #1e1b4b;border-radius:14px;padding:20px;margin-bottom:20px;transition:.2s}
    .chart-box:hover{border-color:#78350f}
    .chart-box h2{font-size:12px;font-weight:700;margin-bottom:14px;color:#fcd34d;text-transform:uppercase;letter-spacing:.7px;padding-left:10px;border-left:3px solid #f59e0b}
    .chart-box h2 .sub{font-size:11px;color:#d1d5db;font-weight:400;text-transform:none;letter-spacing:0}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{padding:10px 12px;text-align:left;font-weight:600;color:#f59e0b;font-size:10px;text-transform:uppercase;letter-spacing:.5px;background:#11131c;border-bottom:1px solid #1e1b4b}
    td{padding:9px 12px;text-align:left;border-bottom:1px solid #11131c;color:#c4c9d4;font-variant-numeric:tabular-nums}
    tbody tr:hover{background:#151830!important}
    tbody tr:nth-child(even){background:#0f1119}
    .table-wrap{max-height:400px;overflow-y:auto;overflow-x:auto;border:1px solid #1e1b4b;border-radius:10px}
    .table-wrap thead th{position:sticky;top:0;z-index:3;background:#0b0d14;box-shadow:0 1px 0 #1e1b4b}
    .table-wrap tbody .tot-row td{position:sticky;bottom:0;z-index:2;background:#151830!important;box-shadow:0 -1px 0 #f59e0b}
    .table-wrap tfoot.tot-row td{position:sticky;bottom:0;z-index:2;background:#151830!important;box-shadow:0 -1px 0 #f59e0b}
    .text-right{text-align:right}
    .text-center{text-align:center}
    .tot-row td{background:#151830!important;border-top:2px solid #f59e0b;font-weight:700}
    .badge{padding:2px 10px;border-radius:4px;font-size:10px;font-weight:700;display:inline-block}
    .badge-green{background:rgba(52,211,153,.15);color:#34d399}
    .badge-red{background:rgba(239,68,68,.15);color:#f87171}
    .badge-yellow{background:rgba(245,158,11,.15);color:#fbbf24}
    .pct-bar{height:8px;background:#1e1b4b;border-radius:4px;overflow:hidden;margin-top:6px}
    .pct-bar-fill{height:100%;border-radius:4px;min-width:2px}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid #1e1b4b;border-top-color:#f59e0b;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    footer{text-align:center;padding:16px 20px;font-size:11px;color:#4a4d6e;border-top:1px solid #1e1b4b;margin-top:24px}
    footer strong{color:#6b7280}
    @media print{body{background:#fff!important;color:#000!important}header,nav,.top-bar,.tabs,.upload-area,#inputArquivo,footer{display:none!important}.container{max-width:100%!important;padding:0!important}.chart-box{background:#fff!important;border:1px solid #ddd!important;break-inside:avoid}.chart-box h2{color:#333!important;border-left-color:#f59e0b!important}.card{background:#f8f8f8!important;border:1px solid #ccc!important}.card .label{color:#666!important}.card .value{color:#000!important}th{color:#000!important;background:#f0f0f0!important}td{color:#333!important;border-color:#ddd!important}.tot-row td{background:#e8e8e8!important}@page{size:landscape;margin:8mm}}
  </style>
</head>
<body>
  <header>
    <h1>&#128222; Painel de Recuperação — Tele Vendas</h1>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span id="statusFile" style="font-size:11px;color:#6b7280"></span>
      <button onclick="novoArquivo()" style="background:#1e1b4b;border:1px solid #78350f;color:#fcd34d;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;display:none" id="btnNovoArquivo">&#128193; Novo arquivo</button>
    </div>
  </header>
  <div class="container" id="app">
    <div style="position:relative;width:100%">
      <input type="file" id="inputArquivo" accept=".xlsx,.xls" multiple style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:5;font-size:0" onchange="try{if(this.files&&this.files.length){if(typeof processMultipleFiles==='function')processMultipleFiles(this.files);else document.getElementById('areaInicial').innerHTML='<div style=color:#f87171;font-size:13px>Erro: processMultipleFiles nao definido (_scriptExec='+(window._scriptExec||'false')+')</div>'}}catch(e){document.getElementById('areaInicial').innerHTML='<div style=color:#f87171;font-size:13px>Erro: '+e.message+'</div>';console.error(e)}">
      <div class="upload-area" id="areaInicial" ondragover="this.classList.add('dragover');event.preventDefault()" ondragleave="this.classList.remove('dragover')" ondrop="event.preventDefault();this.classList.remove('dragover');if(event.dataTransfer.files[0])processFile(event.dataTransfer.files[0])">
        <div style="font-size:48px;margin-bottom:12px;opacity:.5">📂</div>
        <div style="font-size:16px;color:#9ca3af;font-weight:500">Clique para selecionar o arquivo Excel</div>
        <div style="font-size:13px;color:#4a4d6e;margin-top:4px">Painel CRM - Junho.xlsx (com aba EVOLUCAO DOS MESES)</div>
      </div>
    </div>
  </div>
  <div id="tabsContainer"></div>
  <div id="dashContent"></div>
  <footer id="footer" style="display:none"></footer>

  <script>
    window._scriptExec = true;
    try { if (typeof Chart !== 'undefined' && typeof ChartDataLabels !== 'undefined') Chart.register(ChartDataLabels); } catch(e) {}
    var app = document.getElementById('app');
    var inputArquivo = document.getElementById('inputArquivo');
    var allData = null;
    var activeTab = 'resumo';

    // change handled via inline onchange on the input

    function abrirArquivo() { inputArquivo.click(); }

    function detectMonthFromName(fileName) {
      var n = fileName.toLowerCase();
      if (n.indexOf('abril') >= 0) return 'Abril';
      if (n.indexOf('maio') >= 0) return 'Maio';
      return 'Junho';
    }

    function processMultipleFiles(files) {
      var total = files.length;
      allData = null;
      var junhoWb = null, processados = 0;
      function maybeDone() {
        if (processados < total) return;
        inputArquivo.value = '';
        // Always parse EVOLUCAO DOS MESES, FATURAMENTO and PROFISSIONAIS from Junho
        if (junhoWb) {
          var sm = {};
          for (var si = 0; si < junhoWb.SheetNames.length; si++) {
            var sn = junhoWb.SheetNames[si];
            sm[sn.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')] = junhoWb.Sheets[sn];
          }
          var evolKey = 'evolucao dos meses'.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
          if (sm[evolKey]) {
            allData.evolucaoMeses = {indicadores:[], valorPorProf:[], recuperadosPorProf:[]};
            var grid = XLSX.utils.sheet_to_json(sm[evolKey], {header:1, defval:''});
            parseEvolucaoMeses(grid, allData);
          }
          // FATURAMENTO RECUPERACAO from Junho
          var fatKey = 'faturamento recuperacao'.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
          if (sm[fatKey]) {
            var fg = XLSX.utils.sheet_to_json(sm[fatKey], {header:1, defval:''});
            allData.faturamentoClientes = [];
            for (var fr = 1; fr < fg.length; fr++) {
              var row = fg[fr];
              if (!row || !row[0]) continue;
              var fp = String(row[0]).trim();
              var fid = parseInt(row[1]);
              var fnome = String(row[2]||'').trim();
              var fv = parseNum(row[3]);
              var fm = String(row[4] || '').trim();
              if (!fp || !fm || ['Abril','Maio','Junho'].indexOf(fm) < 0) continue;
              if (isNaN(fid) || fid <= 0) continue;
              allData.faturamentoClientes.push({cliente:fid, nome:fnome, valor:fv, mes:fm, prof:fp});
            }
            allData.faturamentoClientes.sort(function(a,b){return b.valor - a.valor;});
          }
        }
        var fn = Array.prototype.map.call(files,function(f){return f.name;}).join(', ');
        document.getElementById('areaInicial').innerHTML = '<div style="font-size:40px;margin-bottom:8px">✅</div><div style="color:#34d399;font-size:15px;font-weight:600">' + total + ' arquivo(s) carregado(s)</div><div style="color:#6b7280;font-size:12px;margin-top:2px">Mesclado com sucesso</div>';
        var now = new Date();
        document.getElementById('footer').style.display = 'block';
        document.getElementById('footer').innerHTML = '<strong>' + fn + '</strong> &middot; ' + now.toLocaleDateString('pt-BR') + ' &agrave;s ' + now.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}) + ' &middot; Painel de Recupera\u00E7\u00E3o';
        initTabs();
        switchTab('resumo');
        document.getElementById('btnNovoArquivo').style.display = 'inline-flex';
      }
      function processOne(file) {
        document.getElementById('areaInicial').innerHTML = '<div style="color:#f59e0b;margin-bottom:6px"><span class="spinner"></span></div><div style="color:#fcd34d;font-size:14px">Processando ' + file.name + ' (' + (processados+1) + '/' + total + ')...</div>';
        var reader = new FileReader();
        reader.onload = function(ev) {
          try {
            var data = new Uint8Array(ev.target.result);
            var wb = XLSX.read(data, {type:'array'});
            var month = detectMonthFromName(file.name);
            if (!allData) {
              allData = parseAllSheets(wb, month);
            } else {
              mergeSheetInto(wb, month);
            }
            if (month === 'Junho') junhoWb = wb;
            processados++;
            maybeDone();
          } catch(err) {
            document.getElementById('areaInicial').innerHTML = '<div style="font-size:40px;margin-bottom:8px">&#9888;</div><div style="color:#f87171;font-size:14px">Erro em ' + file.name + ': ' + err.message + '</div><div style="color:#4a4d6e;font-size:12px;margin-top:4px;cursor:pointer" onclick="abrirArquivo()">Clique para tentar novamente</div>';
          }
        };
        reader.readAsArrayBuffer(file);
      }
      for (var fi = 0; fi < total; fi++) processOne(files[fi]);
    }

    function mergeSheetInto(wb, monthName) {
      var pgMap = {abril:'painelAbril',maio:'painelMaio',junho:'painelGeral'};
      var targetKey = pgMap[monthName.toLowerCase()] || 'painelGeral';
      for (var si = 0; si < wb.SheetNames.length; si++) {
        var sNorm = wb.SheetNames[si].toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[-\s]/g,'');
        var tgt = {'painelgeralabril':'painelAbril','painelgeralmaio':'painelMaio','painelgeraljunho':'painelGeral','painelgeral':'painelGeral'}[sNorm];
        if (tgt === targetKey) {
          var pg = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[si]], {header:1, defval:''});
          allData[targetKey] = {recuperacao:{profissionais:[],total:null}, metaContatos:{profissionais:[],total:null}, motivos:[]};
          parsePainelGeral(pg, {painelGeral: allData[targetKey]});
          return;
        }
      }
    }

    function processFile(file) {
      document.getElementById('areaInicial').innerHTML = '<div style="color:#f59e0b;margin-bottom:6px"><span class="spinner"></span></div><div style="color:#fcd34d;font-size:14px">Processando ' + file.name + '...</div>';
      var reader = new FileReader();
      reader.onload = function(ev) {
        inputArquivo.value = '';
        try {
          var data = new Uint8Array(ev.target.result);
          var wb = XLSX.read(data, {type:'array'});
          allData = parseAllSheets(wb);
          document.getElementById('areaInicial').innerHTML = '<div style="font-size:40px;margin-bottom:8px">✅</div><div style="color:#34d399;font-size:15px;font-weight:600">' + file.name + '</div><div style="color:#6b7280;font-size:12px;margin-top:2px">Carregado com sucesso</div>';
          var now = new Date();
          document.getElementById('footer').style.display = 'block';
          document.getElementById('footer').innerHTML = '<strong>' + file.name + '</strong> &middot; ' + now.toLocaleDateString('pt-BR') + ' &agrave;s ' + now.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}) + ' &middot; Painel de Recupera\u00E7\u00E3o';
          initTabs();
          switchTab('resumo');
          document.getElementById('btnNovoArquivo').style.display = 'inline-flex';
        } catch(err) {
          document.getElementById('areaInicial').innerHTML = '<div style="font-size:40px;margin-bottom:8px">⚠</div><div style="color:#f87171;font-size:14px">Erro: ' + err.message + '</div><div style="color:#4a4d6e;font-size:12px;margin-top:4px;cursor:pointer" onclick="abrirArquivo()">Clique para tentar novamente</div>';
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function novoArquivo() {
      document.getElementById('areaInicial').parentElement.style.display = 'block';
      document.getElementById('areaInicial').innerHTML = '<div style="font-size:48px;margin-bottom:12px;opacity:.5">📂</div><div style="font-size:16px;color:#9ca3af;font-weight:500">Clique para selecionar o arquivo Excel</div><div style="font-size:13px;color:#4a4d6e;margin-top:4px">Painel CRM - Junho.xlsx (com aba EVOLUCAO DOS MESES)</div>';
      document.getElementById('tabsContainer').innerHTML = '';
      document.getElementById('dashContent').innerHTML = '';
      document.getElementById('footer').style.display = 'none';
      allData = null;
    }

    function parseAllSheets(wb, baseMonth) {
      baseMonth = baseMonth || 'Junho';
      var result = {evolucaoMeses:{indicadores:[], valorPorProf:[], recuperadosPorProf:[]}, painelGeral:{recuperacao:{profissionais:[],total:null}, metaContatos:{profissionais:[],total:null}, motivos:[]}, painelAbril:{recuperacao:{profissionais:[],total:null}, metaContatos:{profissionais:[],total:null}, motivos:[]}, painelMaio:{recuperacao:{profissionais:[],total:null}, metaContatos:{profissionais:[],total:null}, motivos:[]}, profissionais:{}, faturamentoTotal:0, faturamentoClientes:[]};
      var sheetMap = {};
      for (var si = 0; si < wb.SheetNames.length; si++) {
        var sn = wb.SheetNames[si];
        sheetMap[sn.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')] = wb.Sheets[sn];
      }

      // EVOLUCAO DOS MESES
      var evolKey = 'evolucao dos meses'.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      if (sheetMap[evolKey]) {
        var grid = XLSX.utils.sheet_to_json(sheetMap[evolKey], {header:1, defval:''});
        parseEvolucaoMeses(grid, result);
      }

      // PAINEL GERAL sheets (Painel Geral - Abril, Painel Geral - Maio, Painel Geral - Junho)
      var pgTargets = {'painelgeralabril':'painelAbril','painelgeralmaio':'painelMaio','painelgeraljunho':'painelGeral','painelgeral':'painelGeral'};
      console.log('SheetNames:', wb.SheetNames);
      for (var si = 0; si < wb.SheetNames.length; si++) {
        var sNorm = wb.SheetNames[si].toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[-\s]/g,'');
        console.log('  ->', wb.SheetNames[si], '=>', sNorm, 'target?', pgTargets[sNorm]);
        var targetStore = pgTargets[sNorm];
        if (targetStore) {
          var pg = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[si]], {header:1, defval:''});
          console.log('  parsed rows:', pg.length, 'row0:', pg[0]);
          // Debug: dump column A of first 15 rows
          var dump = [];
          for (var di = 0; di < Math.min(15, pg.length); di++) {
            var r = pg[di];
            dump.push('r'+di+'=[0:'+JSON.stringify(r&&r[0])+',1:'+JSON.stringify(r&&r[1])+',2:'+JSON.stringify(r&&r[2])+']');
          }
          console.log('  -> dump:', dump.join('; '));
          result[targetStore] = {recuperacao:{profissionais:[],total:null}, metaContatos:{profissionais:[],total:null}, motivos:[]};
          parsePainelGeral(pg, {painelGeral: result[targetStore]});
          console.log('  profissionais parsed:', result[targetStore].recuperacao.profissionais.length, JSON.stringify(result[targetStore].recuperacao.profissionais));
        }
      }

      // PROFISSIONAIS (parsing desativado — usa apenas Painel Geral)

      // FATURAMENTO RECUPERACAO
      var fatKey = 'faturamento recuperacao'.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      if (sheetMap[fatKey]) {
        var fg = XLSX.utils.sheet_to_json(sheetMap[fatKey], {header:1, defval:''});
        result.faturamentoClientes = [];
        for (var fr = 1; fr < fg.length; fr++) {
          var row = fg[fr];
          if (!row || !row[0]) continue;
          var fp = String(row[0]).trim();
          var fid = parseInt(row[1]);
          var fnome = String(row[2]||'').trim();
          var fv = parseNum(row[3]);
          var fm = String(row[4] || '').trim();
          if (!fp || !fm || ['Abril','Maio','Junho'].indexOf(fm) < 0) continue;
          if (isNaN(fid) || fid <= 0) continue;
          result.faturamentoClientes.push({cliente:fid, nome:fnome, valor:fv, mes:fm, prof:fp});
        }
        result.faturamentoClientes.sort(function(a,b){return b.valor - a.valor;});
      }

      return result;
    }

    function parseEvolucaoMeses(grid, result) {
      for (var r = 0; r < grid.length; r++) {
        var row = grid[r];
        if (!row || !row[0]) continue;
        var label = String(row[0]).trim();
        if (label === 'Indicador') {
          for (var ri = r+1; ri < grid.length; ri++) {
            var r2 = grid[ri];
            if (!r2 || !r2[0] || String(r2[0]).trim() === '') break;
            if (r2[3] === undefined || r2[3] === '') break;
            var indLabel = String(r2[0]).trim();
            var isPct = indLabel.indexOf('%') >= 0;
            result.evolucaoMeses.indicadores.push({
              label: indLabel,
              Abril: isPct ? parsePct(r2[1]) : parseNum(r2[1]),
              Maio: isPct ? parsePct(r2[2]) : parseNum(r2[2]),
              Junho: isPct ? parsePct(r2[3]) : parseNum(r2[3])
            });
          }
          continue;
        }
        if (label === 'Mês' && String(row[1]||'').trim() === 'Conversões') {
          for (var ri = r+1; ri < grid.length; ri++) {
            var r2 = grid[ri];
            if (!r2 || !r2[0] || String(r2[0]).trim() === '') break;
          }
          continue;
        }
        if (label === 'Mês' && String(row[1]||'').trim() === 'Meta' && String(row[2]||'').trim() === 'Realizado') {
          for (var ri = r+1; ri < grid.length; ri++) {
            var r2 = grid[ri];
            if (!r2 || !r2[0]) break;
          }
          continue;
        }
        if (label === 'Profissional' && String(row[1]||'').trim() === 'Abril') {
          var colNames = [];
          for (var ci = 1; ci < row.length; ci++) { colNames.push(String(row[ci]).trim()); }
          for (var ri = r+1; ri < grid.length; ri++) {
            var r2 = grid[ri];
            if (!r2 || !r2[0] || String(r2[0]).trim() === '') break;
            var profName = String(r2[0]).trim();
            var dup = false;
            for (var di = 0; di < result.evolucaoMeses.valorPorProf.length; di++) {
              if (result.evolucaoMeses.valorPorProf[di].profissional === profName) { dup = true; break; }
            }
            if (dup || profName.toLowerCase() === 'equipe') continue;
            var entry = {profissional: profName};
            for (var ci = 0; ci < colNames.length; ci++) {
              var cv = parseNum(r2[ci+1]);
              if (cv > 0) entry[colNames[ci]] = cv;
            }
            if (colNames.indexOf('Total') >= 0) entry.Total = parseNum(r2[colNames.indexOf('Total')+1]);
            result.evolucaoMeses.valorPorProf.push(entry);
          }
          continue;
        }
        if (label === 'RECUPERADOS POR RCA' || label === 'RECUPERADOS POR RAC') {
          // Extract month labels from title row
          var rcaMonths = [];
          var titleRow = grid[r] || [];
          for (var ci = 1; ci < titleRow.length; ci++) {
            var tv = String(titleRow[ci]).trim();
            if (tv.indexOf('Painel ') >= 0) {
              var m = tv.replace(/.*?Painel\s*(?:CRM\s*)?-?\s*/i,'').trim();
              if (m) rcaMonths.push(m);
            }
          }
          // Find actual header row (skip empty rows)
          var hdrRow = r + 1;
          while (hdrRow < grid.length) {
            var hr = grid[hdrRow];
            if (hr && String(hr[0]).trim() !== '' && hr[1] !== undefined && hr[1] !== null && String(hr[1]).trim() !== '') break;
            hdrRow++;
          }
          if (hdrRow < grid.length) {
            var hdr = grid[hdrRow];
            // First column is month label, extract it
            var firstMonth = String(hdr[0]).trim().replace(/.*?Painel\s*(?:CRM\s*)?-?\s*/i,'').trim() || 'Mês';
            var allMonths = [firstMonth].concat(rcaMonths);
            var rcaCols = [];
            var midx = 0;
            for (var ci = 1; ci < (hdr||[]).length; ci++) {
              var cn = String(hdr[ci]).trim();
              if (!cn) continue;
              var cu = cn.toUpperCase();
              if (cu === 'META') {
                rcaCols.push((allMonths[midx]||'Mês') + ' ' + cn);
                midx++;
              } else if (cu === 'REAL' || cu === 'REALIZADO') {
                rcaCols.push((allMonths[midx-1]||'Mês') + ' ' + cn);
              } else if (cn.indexOf('%') >= 0) {
                rcaCols.push((allMonths[midx-1]||'Mês') + ' ' + cn);
              } else {
                rcaCols.push(cn);
              }
            }
            for (var ri = hdrRow + 1; ri < grid.length; ri++) {
              var r2 = grid[ri];
              if (!r2 || !r2[0] || String(r2[0]).trim() === '') break;
              var profName = String(r2[0]).trim();
              if (profName.toLowerCase() === 'equipe' || profName.toLowerCase() === 'total') continue;
              var entry = {profissional: profName};
              for (var ci = 0; ci < rcaCols.length; ci++) {
                var cv = rcaCols[ci].indexOf('%') >= 0 ? parsePct(r2[ci+1]) : parseNum(r2[ci+1]);
                if (cv > 0) entry[rcaCols[ci]] = cv;
              }
              result.evolucaoMeses.recuperadosPorProf.push(entry);
            }
          }
          continue;
        }
      }
    }

    function parsePainelGeral(grid, result) {
      var recRow = -1, motRow = -1, contRow = -1;
      for (var r = 0; r < grid.length; r++) {
        var row = grid[r];
        if (!row || !row[0]) continue;
        var c = String(row[0]).trim();
        var cu = c.toUpperCase();
        if (cu === 'META RECUPERAÇÃO' || cu === 'META RECUPERACAO') recRow = r;
        if (cu === 'MOTIVOS') motRow = r;
        if (cu === 'META CONTATOS') contRow = r;
      }

      if (recRow >= 0) {
        var r = recRow + 2;
        while (r < grid.length) {
          var row = grid[r];
          if (!row || !row[0]) { r++; continue; }
          var name = String(row[0]).trim();
          if (!name || name === 'Total' || name === '') {
            if (name === 'Total') result.painelGeral.recuperacao.total = {profissional:'Total', meta:parseNum(row[1]), realizado:parseNum(row[2]), pct:parsePct(row[3]), dias:parseDias(row,4)};
            break;
          }
          result.painelGeral.recuperacao.profissionais.push({profissional:name, meta:parseNum(row[1]), realizado:parseNum(row[2]), pct:parsePct(row[3]), dias:parseDias(row,4)});
          r++;
        }
      }

      if (motRow >= 0) {
        var profNames = result.painelGeral.recuperacao.profissionais.map(function(p){return p.profissional;});
        var mi = motRow + 2;
        while (mi < grid.length) {
          var row = grid[mi];
          if (!row || !row[0]) { mi++; continue; }
          var label = String(row[0]).trim();
          if (!label) { mi++; continue; }
          if (label === 'Total') {
            var tv = {label:'Total'};
            for (var j = 0; j < profNames.length && j+1 < row.length; j++) tv[profNames[j]] = parseNum(row[j+1]);
            tv.Total = parseNum(row[profNames.length+1]);
            result.painelGeral.motivos.push(tv);
            break;
          }
          var vals = {label:label};
          for (var j = 0; j < profNames.length && j+1 < row.length; j++) vals[profNames[j]] = parseNum(row[j+1]);
          vals.Total = parseNum(row[profNames.length+1]);
          result.painelGeral.motivos.push(vals);
          mi++;
        }
      }

      if (contRow >= 0) {
        var r = contRow + 2;
        while (r < grid.length) {
          var row = grid[r];
          if (!row || !row[0]) { r++; continue; }
          var name = String(row[0]).trim();
          if (!name || name === 'Total') {
            if (name === 'Total') result.painelGeral.metaContatos.total = {profissional:'Total', meta:parseNum(row[1]), realizado:parseNum(row[2]), pct:parsePct(row[3]), dias:parseDias(row,4)};
            break;
          }
          result.painelGeral.metaContatos.profissionais.push({profissional:name, meta:parseNum(row[1]), realizado:parseNum(row[2]), pct:parsePct(row[3]), dias:parseDias(row,4)});
          r++;
        }
      }
    }

    function parseProfessionalSheet(name, grid) {
      var data = {conversao:{}, contatos:{meta:0,realizado:0}, clientes:[], faturamento:0};
      var convRow = -1, contRow = -1;
      for (var r = 0; r < Math.min(grid.length, 50); r++) {
        var row = grid[r];
        if (!row || !row[0]) continue;
        var c = String(row[0]).trim().toUpperCase();
        if (c.indexOf('META CONVERSÃO') >= 0 || c.indexOf('META CONVERSAO') >= 0) convRow = r;
        if (c.indexOf('META CONTATO') >= 0) contRow = r;
      }
      if (convRow >= 0) {
        var metaRow = grid[convRow + 2];
        var convRowData = grid[convRow + 3];
        if (metaRow && convRowData) {
          var dias = [];
          for (var c = 4; c < metaRow.length; c++) {
            var dayNum = parseInt(metaRow[c]);
            if (!isNaN(dayNum) && dayNum >= 1 && dayNum <= 31) dias.push({dia:dayNum, meta:parseNum(metaRow[c]), realizado:parseNum(convRowData[c])});
          }
          data.conversao.dias = dias;
        }
      }
      if (contRow >= 0) {
        var metaRow = grid[contRow + 1];
        var realizRow = grid[contRow + 2];
        if (metaRow && realizRow) { data.contatos.meta = parseNum(metaRow[1]); data.contatos.realizado = parseNum(realizRow[1]); }
      }
      for (var r = 2; r < grid.length; r++) {
        var row = grid[r];
        if (row && row[29] !== undefined && row[29] !== '') data.faturamento += parseNum(row[29]);
      }
      return data;
    }

    function parseNum(v) { if (v===''||v===undefined||v===null) return 0; if (typeof v==='number') return v; var s=String(v).trim().replace(/[^\d.,-]/g,'').replace(',','.').replace(/\.(?=.*\.)/g,''); var n=parseFloat(s); return isNaN(n)?0:n; }
    function parsePct(v) { if (v===''||v===undefined||v===null) return 0; if (typeof v==='number') return Math.round(v*10000)/100; var s=String(v).trim().replace('%','').replace(',','.'); var n=parseFloat(s); return isNaN(n)?0:n; }
    function parseCurrency(v) { if (v===''||v===undefined||v===null) return 0; if (typeof v==='number') return v; return parseFloat(String(v).replace(/R\$\s*/gi,'').replace(/\./g,'').replace(',','.').trim())||0; }
    function parseDias(row, startCol) { var dias=[]; for (var c=startCol; c+1<row.length; c+=2) dias.push({meta:parseNum(row[c]), realizado:parseNum(row[c+1])}); return dias; }
    function fmtCurr(v) { if (v==null||isNaN(v)) return '-'; return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
    var icn = function(n,s){s=s||14; return '<i data-lucide="'+n+'" style="display:inline-block;width:'+s+'px;height:'+s+'px;vertical-align:middle;stroke:currentColor;stroke-width:2;flex-shrink:0;margin-right:4px"></i>';};

    function renderResumo() {

      html += '</div>';

        html += '<div class="chart-box"><h2>Valor Recuperado por Mês <span class="sub">&rarr; Faturamento por televendedora em cada mês</span></h2><div class="table-wrap"><table><thead><tr><th class="col-ranking">Ranking</th><th>Televendedora</th><th class="text-right" title="Valor recuperado em Abril">Abril</th><th class="text-right" title="Valor recuperado em Maio">Maio</th><th class="text-right" title="Valor recuperado em Junho">Junho</th><th class="text-right" title="Valor total recuperado">Total</th></tr></thead><tbody>' + vpRows + '<tr class="tot-row"><td class="col-ranking"></td><td style="color:#fcd34d;font-weight:700">Total</td><td class="text-right realizado-color" style="font-weight:700">' + fmtCurr(vpTotA) + '</td><td class="text-right realizado-color" style="font-weight:700">' + fmtCurr(vpTotM) + '</td><td class="text-right realizado-color" style="font-weight:700">' + fmtCurr(vpTotJ) + '</td><td class="text-right" style="color:#fbbf24;font-weight:700">' + fmtCurr(vpTotT) + '</td></tr></tbody></table></div></div>';

      var clientes = allData.faturamentoClientes || [];
      var grandTotal = clientes.reduce(function(s,c){return s+(c.valor||0);},0);
      var maxVal = clientes.length > 0 ? Math.max.apply(null, clientes.map(function(c){return c.valor||0;})) : 1;
      var ocorrencias = {};
      clientes.forEach(function(c){ocorrencias[c.cliente]=(ocorrencias[c.cliente]||0)+1;});

      if (clientes.length === 0) {
        document.getElementById('dashContent').innerHTML = '<div class="chart-box"><h2>Recupera\u00E7\u00E3o por Cliente <span class="sub">&rarr; FATURAMENTO RECUPERACAO</span></h2><div style="text-align:center;padding:40px;color:#6b7280">Nenhum dado dispon\u00EDvel. Fa\u00E7a o upload do Excel para carregar.</div></div>';
        return;
      }

      var profList = [];
      clientes.forEach(function(c){if (profList.indexOf(c.prof) < 0) profList.push(c.prof);});
      profList.sort();
      var html = '<div class="chart-box"><h2>FATURAMENTO RECUPERACAO <span class="sub">&rarr; Raio-X completo de clientes</span></h2>';
      html += '<div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap"><input type="text" id="filtroId" placeholder="Filtrar por ID do cliente..." style="flex:1;min-width:160px;max-width:240px;background:#11131c;border:1px solid #1e1b4b;border-radius:8px;padding:8px 12px;color:#e1e7ef;font-size:13px;outline:none" autofocus>';
      html += '<select id="filtroProf" style="background:#11131c;border:1px solid #1e1b4b;border-radius:8px;padding:8px 12px;color:#e1e7ef;font-size:12px;outline:none"><option value="">Televendedora: Todas</option>';
      for (var pi = 0; pi < profList.length; pi++) html += '<option value="' + profList[pi] + '">' + profList[pi] + '</option>';
      html += '</select>';
      html += '<select id="filtroMes" style="background:#11131c;border:1px solid #1e1b4b;border-radius:8px;padding:8px 12px;color:#e1e7ef;font-size:12px;outline:none"><option value="">M\u00EAs: Todos</option><option value="Abril">Abril</option><option value="Maio">Maio</option><option value="Junho">Junho</option></select></div>';
      html += '<div class="table-wrap"><table><thead><tr><th class="col-ranking">#</th><th style="color:#6b7280;font-size:10px">ID</th><th>Nome do Cliente</th><th class="text-right" style="color:#f59e0b;font-size:10px">Registros</th><th style="color:#6b7280;font-size:10px">Televendedora</th><th class="text-right" style="color:#34d399">Valor</th><th style="text-align:center;color:#6b7280;font-size:10px">M\u00EAs</th><th style="min-width:60px;color:#6b7280;font-size:10px">Peso</th></tr></thead><tbody id="tbodyClientes">';
      for (var i = 0; i < clientes.length; i++) {
        var c = clientes[i];
        var medal = i === 0 ? '&#x1F947; ' : i === 1 ? '&#x1F948; ' : i === 2 ? '&#x1F949; ' : '';
        var mesCol = c.mes === 'Junho' ? '#34d399' : (c.mes === 'Maio' ? '#60a5fa' : '#a78bfa');
        var barW = ((c.valor||0) / maxVal * 100);
        html += '<tr data-id="' + c.cliente + '" data-nome="' + (c.nome||'').toLowerCase() + '" data-mes="'+c.mes+'" data-prof="' + c.prof + '"><td class="col-ranking">' + (i+1) + '</td><td style="color:#6b7280;font-size:10px">' + c.cliente + '</td><td style="font-weight:600;color:#fcd34d">' + (c.nome || '') + '</td><td class="text-right" style="font-size:10px;color:#f59e0b">' + (ocorrencias[c.cliente] > 1 ? (''+ocorrencias[c.cliente]) : '') + '</td><td style="font-size:10px;color:#9ca3af">' + c.prof + '</td><td class="text-right" style="font-weight:600;color:#34d399">' + fmtCurr(c.valor||0) + '</td><td style="text-align:center"><span style="font-size:10px;padding:1px 6px;border-radius:4px;background:'+mesCol+'22;color:'+mesCol+';font-weight:600">' + c.mes + '</span></td><td style="padding:4px 6px"><div style="height:8px;background:#1e1b4b;border-radius:4px;overflow:hidden"><div style="height:100%;width:'+Math.min(barW,100)+'%;background:#f59e0b;border-radius:4px"></div></div></td></tr>';
      }
      html += '</tbody><tfoot class="tot-row"><tr><td class="col-ranking"></td><td style="color:#4a4d6e">-</td><td style="font-weight:700;color:#fcd34d">Total Geral</td><td class="text-right" style="color:#f59e0b;font-weight:700">'+clientes.length+'</td><td style="color:#4a4d6e">-</td><td class="text-right realizado-color" style="font-weight:700">' + fmtCurr(grandTotal) + '</td><td style="text-align:center"></td><td></td></tr></tfoot></table></div></div>';

      document.getElementById('dashContent').innerHTML = html;

      setTimeout(function() {
        var idF = document.getElementById('filtroId');
        var profF = document.getElementById('filtroProf');
        var mesF = document.getElementById('filtroMes');
        function applyFilters() {
          var idQ = idF ? idF.value.toLowerCase() : '';
          var profQ = profF ? profF.value : '';
          var mesQ = mesF ? mesF.value : '';
          var rows = document.querySelectorAll('#tbodyClientes tr');
          for (var ri = 0; ri < rows.length; ri++) {
            var r = rows[ri];
            var matchId = !idQ || String(r.getAttribute('data-id')).indexOf(idQ) >= 0;
            var matchProf = !profQ || r.getAttribute('data-prof') === profQ;
            var matchMes = !mesQ || r.getAttribute('data-mes') === mesQ;
            r.style.display = matchId && matchProf && matchMes ? '' : 'none';
          }
        }
        if (idF) { idF.addEventListener('input', applyFilters); idF.focus(); }
        if (profF) profF.addEventListener('change', applyFilters);
        if (mesF) mesF.addEventListener('change', applyFilters);
      }, 50);
      try { lucide.createIcons(); } catch(e) {}
    }

    function renderMotivos() {
      var d = allData.painelGeral;
      var profsAll = d.recuperacao.profissionais;
      var profs = profsAll;
      var dataRows = d.motivos.filter(function(r){return r.label !== 'Total';});
       var html = '<div class="chart-box"><h2>Motivos / Resultados dos Contatos <span class="sub">&rarr; Detalhamento por televendedora</span></h2><div class="table-wrap"><table><thead><tr><th class="col-ranking">Ranking</th><th>Motivo</th>';
      for (var i = 0; i < profs.length; i++) html += '<th class="text-right">' + profs[i].profissional + '</th>';
      html += '<th class="text-right">Total</th><th style="text-align:center">%</th></tr></thead><tbody>';
      var grandTotal = dataRows.reduce(function(s,r){return s+(r.Total||0);},0);
      for (var i = 0; i < dataRows.length; i++) {
        var row = dataRows[i];
        var total = row.Total||0;
        var pct = grandTotal>0?(total/grandTotal*100).toFixed(1):0;
        var medal = i === 0 ? '&#x1F947; ' : i === 1 ? '&#x1F948; ' : i === 2 ? '&#x1F949; ' : '';
        html += '<tr'+(i%2===0?'':' style="background:#11131c"')+'><td class="col-ranking">'+medal+(i+1)+'</td><td style="font-weight:600">'+row.label+'</td>';
        for (var j = 0; j < profs.length; j++) html += '<td class="text-right">'+(row[profs[j].profissional]||0)+'</td>';
        html += '<td class="text-right" style="font-weight:700">'+total+'</td><td style="text-align:center"><div class="pct-bar" style="height:16px"><div class="pct-bar-fill" style="width:'+Math.min(pct,100)+'%;background:#f59e0b"></div><span style="position:relative;font-size:9px;color:#fff;padding-left:6px">'+pct+'%</span></div></td></tr>';
      }
      html += '</tbody></table></div></div></div>';

      html += '<div class="chart-box"><h2>Distribui\u00E7\u00E3o dos Motivos <span class="sub">&rarr; Porcentagem de cada motivo no total</span></h2><canvas id="chartMotivos" style="max-height:220px"></canvas></div>';

      document.getElementById('dashContent').innerHTML = html;

      setTimeout(function() {
        try {
          var labels = dataRows.map(function(r){return r.label;});
          var valores = dataRows.map(function(r){return r.Total||0;});
          new Chart(document.getElementById('chartMotivos'), {
            type:'doughnut', data:{labels:labels, datasets:[{data:valores,backgroundColor:['#f59e0b','#34d399','#ef4444','#a78bfa','#60a5fa','#f97316','#ec4899'],borderColor:'#0b0d14',borderWidth:2}]},
            options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{datalabels:{display:false},legend:{position:'left',labels:{color:'#9ca3af',padding:14,boxWidth:12,font:{size:12,weight:'bold'},usePointStyle:true}},tooltip:{backgroundColor:'#1e1b4b',titleColor:'#fcd34d',bodyColor:'#e1e7ef',borderColor:'#f59e0b',borderWidth:1,mode:'index',intersect:false},title:{display:true,text:'Distribui\u00E7\u00E3o dos Motivos',color:'#6b7280',font:{size:13}}}}}
          );
        } catch(e) {}
      }, 100);
    }

      // Initialize: just show upload area
      document.getElementById('areaInicial').style.display = 'flex';
  </script>
</body>
</html>

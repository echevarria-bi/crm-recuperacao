<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Painel de Recuperação - Tele Vendas</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0b0d14;color:#e1e7ef}
    header{background:linear-gradient(135deg,#11131c,#1a1d27);border-bottom:1px solid #1e1b4b;padding:20px 32px;display:flex;align-items:center;flex-wrap:wrap;gap:8px}
    header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#f59e0b,#fb923c,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.5px}
    .container{max-width:1400px;margin:0 auto;padding:24px 32px}
    .upload-area{border:2px dashed #1e1b4b;border-radius:16px;padding:56px;text-align:center;background:linear-gradient(135deg,#11131c,#1a1d27);cursor:pointer;transition:.3s}
    .upload-area:hover{border-color:#f59e0b;background:linear-gradient(135deg,#151830,#1e2030)}
    .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
    .top-bar button{background:#11131c;border:1px solid #1e1b4b;border-radius:10px;padding:9px 18px;cursor:pointer;font-size:14px;color:#9ca3af;transition:.2s}
    .top-bar button:hover{border-color:#f59e0b;color:#fb923c;background:#151830}
    .top-bar .info{font-size:13px;color:#4a4d6e}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:24px}
    .card{background:linear-gradient(135deg,#11131c,#1a1d27);border:1px solid #1e1b4b;border-radius:14px;padding:24px;transition:.3s}
    .card:hover{border-color:#f59e0b;transform:translateY(-2px);box-shadow:0 8px 32px rgba(245,158,11,.1)}
    .card-label{font-size:12px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center}
    .card-value{font-size:28px;font-weight:800;margin-top:4px;color:#f0f2f8;line-height:1.2}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
    .chart-box{background:linear-gradient(135deg,#11131c,#1a1d27);border:1px solid #1e1b4b;border-radius:14px;padding:24px;transition:.2s}
    .chart-box:hover{border-color:#78350f}
    .chart-box h2{font-size:13px;font-weight:800;margin-bottom:16px;color:#fcd34d;text-transform:uppercase;letter-spacing:.8px;padding-left:12px;border-left:3px solid #f59e0b}
    table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
    th{padding:11px 14px;text-align:left;font-weight:600;color:#f59e0b;font-size:11px;text-transform:uppercase;letter-spacing:.5px;background:linear-gradient(180deg,#151830,#11131c);border-bottom:1px solid #1e1b4b}
    td{padding:10px 14px;text-align:left;border-bottom:1px solid #11131c;color:#c4c9d4}
    tbody tr{transition:.1s}
    tbody tr:hover{background:#151830!important}
    .text-right{text-align:right}
    .text-green{color:#34d399}
    .text-blue{color:#60a5fa}
    .text-orange{color:#fb923c}
    .tot-row{font-weight:700}
    .tot-row td{background:#151830!important;border-top:2px solid #f59e0b;color:#f0f2f8}
    .prof-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:24px}
    .prof-card{background:linear-gradient(135deg,#11131c,#1a1d27);border:1px solid #1e1b4b;border-radius:14px;padding:20px;transition:.3s;text-align:center}
    .prof-card:hover{border-color:#f59e0b;transform:translateY(-2px)}
    .prof-card .name{font-size:13px;font-weight:700;color:#fcd34d;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px}
    .prof-card .big-num{font-size:36px;font-weight:800;color:#f0f2f8;line-height:1}
    .prof-card .meta-label{font-size:11px;color:#6b7280;margin-top:4px}
    .prof-card .pct{font-size:24px;font-weight:700;margin-top:4px}
    .pct-bar{height:8px;background:#1e1b4b;border-radius:4px;overflow:hidden;margin-top:8px}
    .pct-bar-fill{height:100%;border-radius:4px;transition:.3s;min-width:2px}
    .tab-bar{display:flex;gap:4px;margin-bottom:20px;background:#11131c;border:1px solid #1e1b4b;border-radius:12px;padding:4px;overflow-x:auto}
    .tab-btn{padding:10px 20px;border:none;border-radius:8px;background:transparent;color:#6b7280;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
    .tab-btn:hover{color:#fcd34d;background:#1a1d27}
    .tab-btn.active{background:linear-gradient(135deg,#78350f,#451a03);color:#fcd34d;border:1px solid #f59e0b}
    .daily-pct-bar{height:20px;background:#1e1b4b;border-radius:4px;overflow:hidden;position:relative}
    .daily-pct-fill{height:100%;border-radius:4px;transition:.3s;min-width:2px}
    .daily-pct-label{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
    .badge{padding:2px 10px;border-radius:4px;font-size:10px;font-weight:700;display:inline-block}
    .badge-green{background:rgba(52,211,153,.15);color:#34d399}
    .badge-red{background:rgba(239,68,68,.15);color:#f87171}
    .badge-yellow{background:rgba(245,158,11,.15);color:#fbbf24}
    @media(max-width:768px){.grid-2{grid-template-columns:1fr}.container{padding:16px}}
    @media print{body{background:#fff!important}header{display:none!important}.top-bar button{display:none!important}.tab-bar{display:none!important}.container{max-width:100%!important;padding:0!important}.chart-box{border:1px solid #ddd!important;background:#fff!important;break-inside:avoid}.chart-box h2{color:#333!important;border-left-color:#f59e0b!important}.card{background:#f8f8f8!important;border:1px solid #ccc!important}.card-label{color:#666!important}.card-value{color:#000!important!important}table{font-size:11px!important}th{color:#000!important!important;background:#f0f0f0!important}td{color:#333!important;border-color:#ddd!important}.tot-row td{background:#e8e8e8!important}.badge,.prof-card{background:#f0f0f0!important}}
  </style>
</head>
<body>
  <header>
    <h1><i data-lucide="phone-call" style="display:inline-block;width:22px;height:22px;vertical-align:middle;stroke:#f59e0b;stroke-width:2;margin-right:6px"></i> Painel de Recuperação — Tele Vendas</h1>
    <span style="font-size:11px;color:#f59e0b;background:#78350f;padding:3px 10px;border-radius:4px;margin-left:12px;font-weight:600">PERÍODO: JUNHO/2026</span>
  </header>
  <div class="container" id="app">
    <div class="upload-area" id="areaInicial" onclick="abrirArquivo()" ondragover="this.classList.add('dragover');event.preventDefault()" ondragleave="this.classList.remove('dragover')" ondrop="event.preventDefault();this.classList.remove('dragover');if(event.dataTransfer.files[0])processFile(event.dataTransfer.files[0])">
      <div class="upload-icon" style="font-size:48px;margin-bottom:12px;opacity:.5">📂</div>
      <div class="upload-text" style="font-size:16px;color:#9ca3af;font-weight:500">Clique para selecionar o arquivo Excel</div>
      <div class="upload-hint" style="font-size:13px;color:#4a4d6e;margin-top:4px">ou arraste e solte o arquivo Painel CRM - Junho.xlsx aqui</div>
    </div>
  </div>
  <input type="file" id="inputArquivo" accept=".xlsx,.xls" style="display:none">
  <script>
    var app = document.getElementById('app');
    var inputArquivo = document.getElementById('inputArquivo');

    inputArquivo.addEventListener('change', function(e) {
      if (e.target.files && e.target.files[0]) {
        processFile(e.target.files[0]);
      }
    });

    function abrirArquivo() {
      inputArquivo.click();
    }

    function processFile(file) {
      app.innerHTML = '<div class="upload-area" style="border-color:#f59e0b;background:#1e1b4b"><div style="font-size:16px;color:#f59e0b">⏳</div><div style="color:#fcd34d;margin-top:8px">Processando arquivo... (' + file.name + ' - ' + (file.size/1024).toFixed(0) + ' KB)</div></div>';
      var reader = new FileReader();
      reader.onload = function(ev) {
        try {
          var data = new Uint8Array(ev.target.result);
          var wb = XLSX.read(data, {type:'array'});
          allData = parseAllSheets(wb);
          render();
        } catch(err) {
          app.innerHTML = '<div class="upload-area" style="border-color:#ef444440;background:#1f1010;cursor:pointer" onclick="abrirArquivo()"><div style="font-size:16px;color:#f87171">⚠</div><div style="color:#fca5a5;margin-top:8px">Erro: ' + err.message + '</div><div style="color:#4a4d6e;margin-top:4px;font-size:13px">' + err.stack + '</div></div>';
        }
      };
      reader.onerror = function() {
        app.innerHTML = '<div class="upload-area" style="border-color:#ef444440;background:#1f1010;cursor:pointer" onclick="abrirArquivo()"><div style="font-size:16px;color:#f87171">⚠</div><div style="color:#fca5a5;margin-top:8px">Erro ao ler o arquivo</div></div>';
      };
      reader.readAsArrayBuffer(file);
    }

    var allData = null;

    function parseAllSheets(wb) {
      var result = {};
      var pgKey = 'painel geral'.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      var pgSheet = null;
      for (var si = 0; si < wb.SheetNames.length; si++) {
        var sn = wb.SheetNames[si];
        if (sn.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'') == pgKey) { pgSheet = wb.Sheets[sn]; break; }
      }
      if (!pgSheet) {
        throw new Error('Planilha "Painel Geral" nao encontrada. Abas disponiveis: ' + wb.SheetNames.join(', '));
      }
      var pg = XLSX.utils.sheet_to_json(pgSheet, {header:1, defval:''});
      result.painelGeral = parsePainelGeral(pg);
      var profs = ['Ariane','Camila','Cristielen','Natália','Tatiana'];
      result.profissionais = {};
      var sheetMap = {};
      for (var si = 0; si < wb.SheetNames.length; si++) {
        var sn = wb.SheetNames[si];
        sheetMap[sn.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')] = wb.Sheets[sn];
      }
      for (var i = 0; i < profs.length; i++) {
        var name = profs[i];
        var key = name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        var ws = sheetMap[key];
        if (ws) {
          var grid = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
          var parsed = parseProfessionalSheet(name, grid);
          result.profissionais[name] = parsed;
          var nameKey = name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
          for (var j = 0; j < result.painelGeral.recuperacao.profissionais.length; j++) {
            var pk = result.painelGeral.recuperacao.profissionais[j].profissional.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
            if (pk === nameKey) {
              result.painelGeral.recuperacao.profissionais[j].faturamento = parsed.faturamento;
              break;
            }
          }
        }
      }
      result.faturamentoTotal = profs.reduce(function(s,name){
        var p = result.profissionais[name];
        return s + (p ? p.faturamento : 0);
      }, 0);
      return result;
    }

    function parsePainelGeral(grid) {
      var data = {recuperacao:{profissionais:[],total:null}, inatividade:[], motivos:[], metaContatos:{profissionais:[],total:null}};
      var recRow=-1, inatRow=-1, motRow=-1, contRow=-1;
      for (var r = 0; r < grid.length; r++) {
        var row = grid[r];
        if (!row || !row[0]) continue;
        var c = String(row[0]).trim().toUpperCase();
        if (c === 'META RECUPERAÇÃO' || c === 'META RECUPERACAO') recRow = r;
        if (c === 'FAIXA DE INATIVIDADE') inatRow = r;
        if (c === 'MOTIVOS') motRow = r;
        if (c === 'META CONTATOS') contRow = r;
      }

      if (recRow >= 0) {
        var r = recRow + 2;
        while (r < grid.length) {
          var row = grid[r];
          if (!row || !row[0]) { r++; continue; }
          var name = String(row[0]).trim();
          if (!name || name === 'Total' || name === '' || name === 'Conversão Total') {
            if (name === 'Total') {
              data.recuperacao.total = {profissional:'Total', meta:parseNum(row[1]), realizado:parseNum(row[2]), pct:parsePct(row[3]), dias:parseDias(row,4)};
              r++;
            }
            break;
          }
          data.recuperacao.profissionais.push({profissional:name, meta:parseNum(row[1]), realizado:parseNum(row[2]), pct:parsePct(row[3]), dias:parseDias(row,4)});
          r++;
        }
        for (; r < grid.length; r++) {
          var row = grid[r];
          if (!row || !row[0]) continue;
          var c = String(row[0]).trim().toUpperCase();
        }
      }

      if (inatRow >= 0) {
        var labels = ['45 a 59 Risco','60 a 74 Atenção','75 a 84 Crítico','85 a 90 Urgente'];
        var profNames = data.recuperacao.profissionais.map(function(p){return p.profissional;});
        for (var i = 0; i < labels.length; i++) {
          var row = grid[inatRow + 2 + i];
          if (!row) continue;
          var vals = {label:labels[i]};
          for (var j = 0; j < profNames.length && j+1 < row.length; j++) vals[profNames[j]] = parseNum(row[j+1]);
          vals.Total = parseNum(row[profNames.length+1]);
          data.inatividade.push(vals);
        }
      }

      if (motRow >= 0) {
        var labels = ['Não atendeu/Não retornou','Contatos Efetivo','Baixado/Outros','Ativo por temporada','Conversão / Venda RCA Externo','Telefone incorreto','Problema Financeiro'];
        var profNames = data.recuperacao.profissionais.map(function(p){return p.profissional;});
        for (var i = 0; i < labels.length; i++) {
          var row = grid[motRow + 2 + i];
          if (!row) continue;
          var vals = {label:labels[i]};
          for (var j = 0; j < profNames.length && j+1 < row.length; j++) vals[profNames[j]] = parseNum(row[j+1]);
          vals.Total = parseNum(row[profNames.length+1]);
          data.motivos.push(vals);
        }
        var totalRow = grid[motRow + 2 + labels.length];
        if (totalRow) {
          var tv = {label:'Total'};
          for (var j = 0; j < profNames.length && j+1 < totalRow.length; j++) tv[profNames[j]] = parseNum(totalRow[j+1]);
          tv.Total = parseNum(totalRow[profNames.length+1]);
          data.motivos.push(tv);
        }
      }

      if (contRow >= 0) {
        var r = contRow + 2;
        while (r < grid.length) {
          var row = grid[r];
          if (!row || !row[0]) { r++; continue; }
          var name = String(row[0]).trim();
          if (!name || name === 'Total') {
            if (name === 'Total') {
              data.metaContatos.total = {profissional:'Total', meta:parseNum(row[1]), realizado:parseNum(row[2]), pct:parsePct(row[3]), dias:parseDias(row,4)};
            }
            break;
          }
          data.metaContatos.profissionais.push({profissional:name, meta:parseNum(row[1]), realizado:parseNum(row[2]), pct:parsePct(row[3]), dias:parseDias(row,4)});
          r++;
        }
      }
      return data;
    }

    function parseProfessionalSheet(name, grid) {
      var data = {conversao:{}, contatos:{meta:0,realizado:0}, clientes:[], faturamento:0};
      var convRow = -1, contRow = -1;
      for (var r = 0; r < Math.min(grid.length, 50); r++) {
        var row = grid[r];
        if (!row || !row[0]) continue;
        var c = String(row[0]).trim().toUpperCase();
        if (c.indexOf('META CONVERSÃO') >= 0 || c.indexOf('META CONVERSAO') >= 0) convRow = r;
        if (c.indexOf('META CONTATO') >= 0) contRow = r;
      }
      if (convRow >= 0) {
        var metaRow = grid[convRow + 2];
        var convRowData = grid[convRow + 3];
        if (metaRow && convRowData) {
          var dias = [];
          for (var c = 4; c < metaRow.length; c++) {
            var dayNum = parseInt(metaRow[c]);
            if (!isNaN(dayNum) && dayNum >= 1 && dayNum <= 31) dias.push({dia:dayNum, meta:parseNum(metaRow[c]), realizado:parseNum(convRowData[c])});
          }
          data.conversao.dias = dias;
        }
        for (var r = convRow + 5; r < Math.min(grid.length, 50); r++) {
          var row = grid[r];
          if (!row || !row[0]) continue;
          var label = String(row[0]).trim();
          if (label.indexOf('Nao atendeu') >= 0 || label.indexOf('Não atendeu') >= 0) { if (!data.motivos) data.motivos={}; data.motivos['Nao atendeu'] = parseNum(row[1]); }
          if (label.indexOf('Contato Efetivo') >= 0) { if (!data.motivos) data.motivos={}; data.motivos['Contato Efetivo'] = parseNum(row[1]); }
          if (label.indexOf('Conversão') >= 0 || label.indexOf('Conversao') >= 0) { if (!data.motivos) data.motivos={}; data.motivos['Conversao'] = parseNum(row[1]); }
          if (label === 'Qtdade' || label === 'QTDADE') {
            for (var r2 = r+1; r2 < grid.length; r2++) {
              var row2 = grid[r2];
              if (!row2 || !row2[0]) continue;
              var id = parseInt(row2[0]);
              if (isNaN(id) || id <= 0) break;
              data.clientes.push({id:id, nome:String(row2[1]||'').trim(), dataVenda:String(row2[2]||''), valor:parseCurrency(row2[3]), penultimaVenda:String(row2[4]||''), rca:String(row2[5]||''), prazo:parseInt(row2[6])});
            }
            break;
          }
        }
      }
      if (contRow >= 0) {
        var metaRow = grid[contRow + 1];
        var realizRow = grid[contRow + 2];
        if (metaRow && realizRow) { data.contatos.meta = parseNum(metaRow[1]); data.contatos.realizado = parseNum(realizRow[1]); }
      }
      for (var r = 2; r < grid.length; r++) {
        var row = grid[r];
        if (row && row[29] !== undefined && row[29] !== '') data.faturamento += parseNum(row[29]);
      }
      return data;
    }

    function parseNum(v) { if (v===''||v===undefined||v===null) return 0; if (typeof v==='number') return v; var s=String(v).trim().replace(/[^\d.,-]/g,'').replace(',','.').replace(/\.(?=.*\.)/g,''); var n=parseFloat(s); return isNaN(n)?0:n; }
    function parsePct(v) { if (v===''||v===undefined||v===null) return 0; if (typeof v==='number') return Math.round(v*10000)/100; var s=String(v).trim().replace('%','').replace(',','.'); var n=parseFloat(s); return isNaN(n)?0:n; }
    function parseCurrency(v) { if (v===''||v===undefined||v===null) return 0; if (typeof v==='number') return v; return parseFloat(String(v).replace(/R\$\s*/gi,'').replace(/\./g,'').replace(',','.').trim())||0; }
    function parseDias(row, startCol) { var dias=[]; for (var c=startCol; c+1<row.length; c+=2) dias.push({meta:parseNum(row[c]), realizado:parseNum(row[c+1])}); return dias; }
    function fmtCurr(v) { return 'R$ '+v.toFixed(2).replace('.',',').replace(/(\d)(?=(\d{3})+(?!\d))/g,'$1.'); }
    var icn = function(n,s){s=s||16;return '<i data-lucide="'+n+'" style="display:inline-block;width:'+s+'px;height:'+s+'px;vertical-align:middle;stroke:currentColor;stroke-width:2;flex-shrink:0;margin-right:4px"></i>';};

    var activeTab = 'geral';
    function render() {
      var d = allData.painelGeral;
      var profs = d.recuperacao.profissionais;
      var days = [1,2,3,5,8,9,10,11,12,15,16,17,18,19,22,23,24,25,26,29,30];
      app.innerHTML =
        '<div class="top-bar"><div><span class="info">'+profs.length+' profissionais · Meta: '+(d.recuperacao.total?d.recuperacao.total.meta:'-')+' · Real: '+(d.recuperacao.total?d.recuperacao.total.realizado:'-')+'</span></div><button onclick="window.print()" style="background:#11131c;border:1px solid #1e1b4b;border-radius:10px;padding:9px 18px;cursor:pointer;font-size:13px;color:#9ca3af;transition:.2s;display:flex;align-items:center;gap:6px" onmouseover="this.style.borderColor=\'#f59e0b\';this.style.color=\'#fb923c\';this.style.background=\'#151830\'" onmouseout="this.style.borderColor=\'#1e1b4b\';this.style.color=\'#9ca3af\';this.style.background=\'#11131c\'">'+icn('printer',14)+' Exportar</button></div>' +
        '<div class="tab-bar">' +
          '<button class="tab-btn'+(activeTab==='resumo'?' active':'')+'" onclick="switchTab(\'resumo\')">'+icn('layout-dashboard',14)+' Resumo</button>' +
          '<button class="tab-btn'+(activeTab==='geral'?' active':'')+'" onclick="switchTab(\'geral\')">'+icn('bar-chart-3',14)+' Painel Geral</button>' +
          '<button class="tab-btn'+(activeTab==='diario'?' active':'')+'" onclick="switchTab(\'diario\')">'+icn('calendar-check',14)+' Diário</button>' +
          
          '<button class="tab-btn'+(activeTab==='motivos'?' active':'')+'" onclick="switchTab(\'motivos\')">'+icn('clipboard-list',14)+' Motivos</button>' +
          
          
        '</div>' +
        '<div id="dashContent"></div>';
      renderTabContent();
      try { lucide.createIcons(); } catch(e) {}
    }

    function switchTab(tab) { activeTab = tab; render(); }

    function renderTabContent() {
      var el = document.getElementById('dashContent');
      if (!el) return;
      if (activeTab === 'resumo') renderResumo();
      else if (activeTab === 'geral') renderGeral();
      else if (activeTab === 'diario') renderDiario();
      
      else if (activeTab === 'motivos') renderMotivos();


    }

    function renderResumo() {

        html += '<tr><td style="background:'+bg+';padding:6px 14px;font-weight:600;color:#fcd34d;border-bottom:1px solid #1e1b4b;font-size:12px">'+icn('user',12)+' '+p.profissional+'</td>' +
          '<td style="background:'+bg+';padding:6px 8px;text-align:center;font-weight:700;color:'+pctColor+';border-bottom:1px solid #1e1b4b;font-size:11px">'+pct+'%</td>' +
          '<td style="background:'+bg+';padding:6px 8px;text-align:center;font-weight:700;color:#f0f2f8;border-bottom:1px solid #1e1b4b;font-size:11px">'+acum+'</td>';
        for (var di = 0; di < days.length; di++) {
          var v = (p.dias && p.dias[di]) ? p.dias[di] : null;
          var mVal = v?v.meta:0;
          var rVal = v?v.realizado:0;
          var isHojeCol = di === hojeIdx;
          var colBg = isHojeCol ? '#1a1d27' : bg;
          var atingiuMeta = rVal >= mVal && mVal > 0;
          var cor = atingiuMeta ? '#34d399' : rVal > 0 ? '#fbbf24' : '#4a4d6e';
          var destaque = isHojeCol ? ';border:1px solid #f59e0b33' : '';
          html += '<td style="background:'+colBg+';padding:6px 2px;text-align:center;font-size:9px;color:#6b7280;border-bottom:1px solid #1e1b4b'+destaque+'">'+(mVal>0?mVal:'-')+'</td>' +
            '<td style="background:'+colBg+';padding:4px 2px;text-align:center;font-size:10px;font-weight:700;color:'+cor+';border-bottom:1px solid #1e1b4b'+destaque+'">'+(rVal>0?rVal:'-')+(mVal>0?'<div class="daily-pct-bar" style="height:6px;margin-top:3px"><div class="daily-pct-fill" style="width:'+Math.min(rVal/mVal*100,100)+'%;background:'+cor+'"></div></div>':'')+'</td>';
        }
        html += '</tr>';
      }
      if (total) {
        var totalAcum = 0;
        for (var ac = 0; ac <= hojeIdx; ac++) { if (total.dias && total.dias[ac]) totalAcum += total.dias[ac].realizado; }
        html += '<tr class="tot-row"><td style="padding:8px 14px;border-top:2px solid #f59e0b;background:#151830;color:#fcd34d;font-weight:700;font-size:12px">'+icn('users',12)+' Total</td>' +
          '<td style="padding:8px 8px;text-align:center;font-weight:700;color:'+(total.pct>=100?'#34d399':total.pct>=80?'#fbbf24':'#f87171')+';border-top:2px solid #f59e0b;background:#151830;font-size:11px">'+total.pct.toFixed(1)+'%</td>' +
          '<td style="padding:8px 8px;text-align:center;font-weight:700;color:#f0f2f8;border-top:2px solid #f59e0b;background:#151830;font-size:11px">'+totalAcum+'</td>';
        for (var di = 0; di < days.length; di++) {
          var v = (total.dias && total.dias[di]) ? total.dias[di] : null;
          var mVal = v?v.meta:0;
          var rVal = v?v.realizado:0;
          var isHojeCol = di === hojeIdx;
          var atingiuMeta = rVal >= mVal && mVal > 0;
          var cor = atingiuMeta ? '#34d399' : rVal > 0 ? '#fbbf24' : '#4a4d6e';
          var destaque = isHojeCol ? ';border:1px solid #f59e0b44' : '';
          html += '<td style="padding:8px 2px;text-align:center;font-size:9px;color:#6b7280;border-top:2px solid #f59e0b;background:#151830'+destaque+'">'+(mVal>0?mVal:'-')+'</td>' +
            '<td style="padding:6px 2px;text-align:center;font-size:10px;font-weight:700;color:'+cor+';border-top:2px solid #f59e0b;background:#151830'+destaque+'">'+(rVal>0?rVal:'-')+(mVal>0?'<div class="daily-pct-bar" style="height:6px;margin-top:3px"><div class="daily-pct-fill" style="width:'+Math.min(rVal/mVal*100,100)+'%;background:'+cor+'"></div></div>':'')+'</td>';
        }
        html += '</tr>';
      }
      html += '</tbody></table></div></div>';

      html += '<div class="chart-box"><h2>Tendência Diária</h2><canvas id="chartDiarioTrend" style="max-height:280px"></canvas></div>';

      document.getElementById('dashContent').innerHTML = html;

      setTimeout(function() {
        try {
          var diasLabels = days.map(function(d){return 'Dia '+d;});
          var totals = [];
          var metas = [];
          for (var di = 0; di < days.length; di++) {
            var sumR = 0, sumM = 0;
            for (var i = 0; i < profs.length; i++) {
              var p = profs[i];
              var v = (p.dias && p.dias[di]) ? p.dias[di] : null;
              if (v) { sumR += v.realizado; sumM += v.meta; }
            }
            totals.push(sumR);
            metas.push(sumM);
          }
          var acc = [];
          var acum = 0;
          for (var di = 0; di < totals.length; di++) { acum += totals[di]; acc.push(acum); }
          new Chart(document.getElementById('chartDiarioTrend'), {type:'line', data:{labels:diasLabels, datasets:[
            {label:'Meta',data:metas,borderColor:'#fb923c',backgroundColor:'transparent',tension:.3,borderDash:[3,3],pointRadius:2,pointBackgroundColor:'#fb923c'},
            {label:'Realizado',data:totals,borderColor:'#f59e0b',backgroundColor:'#f59e0b22',fill:true,tension:.3,pointRadius:3,pointBackgroundColor:'#f59e0b'},
            {label:'Acumulado',data:acc,borderColor:'#34d399',backgroundColor:'transparent',tension:.3,borderDash:[4,3],pointRadius:2,pointBackgroundColor:'#34d399',yAxisID:'y1'}
          ]}, options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#9ca3af',padding:12,boxWidth:12}},tooltip:{backgroundColor:'#1e1b4b',titleColor:'#fcd34d',bodyColor:'#e1e7ef',borderColor:'#f59e0b',borderWidth:1}},scales:{x:{ticks:{color:'#6b7280',maxRotation:45},grid:{color:'#1e1b4b'}},y:{beginAtZero:true,position:'left',ticks:{color:'#6b7280'},grid:{color:'#1e1b4b'},title:{display:true,text:'Diário',color:'#6b7280'}},y1:{position:'right',beginAtZero:true,ticks:{color:'#6b7280'},grid:{display:false},title:{display:true,text:'Acumulado',color:'#6b7280'}}}}});
        } catch(e) {}
        try {
          var profNames = profs.map(function(p){return p.profissional;});
          var profTotals = [];
          for (var i = 0; i < profs.length; i++) {
            var s = 0;
            for (var di = 0; di <= hojeIdx; di++) { var v = (profs[i].dias && profs[i].dias[di]) ? profs[i].dias[di].realizado : 0; s += v; }
            profTotals.push(s);
          }
          var profMetas = profs.map(function(p){return p.meta;});
          new Chart(document.getElementById('chartDiarioProf'), {type:'bar', data:{labels:profNames, datasets:[
            {label:'Meta',data:profMetas,backgroundColor:'#78350f',borderRadius:4},
            {label:'Realizado',data:profTotals,backgroundColor:['#f59e0b','#fb923c','#f97316','#34d399','#a78bfa'],borderRadius:4}
          ]}, options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#9ca3af',padding:12,boxWidth:12}},tooltip:{backgroundColor:'#1e1b4b',titleColor:'#fcd34d',bodyColor:'#e1e7ef',borderColor:'#f59e0b',borderWidth:1}},scales:{x:{ticks:{color:'#6b7280'},grid:{color:'#1e1b4b'}},y:{beginAtZero:true,ticks:{color:'#6b7280'},grid:{color:'#1e1b4b'}}}}});
        } catch(e) {}
        try { lucide.createIcons(); } catch(e) {}
      }, 50);
    }

    function renderMotivos() {
      var d = allData.painelGeral;
      var profs = d.recuperacao.profissionais;
      var dataRows = d.motivos.filter(function(r){return r.label !== 'Total';});
      var totalRow = d.motivos.filter(function(r){return r.label === 'Total';})[0];
      var html = '<div class="chart-box" style="margin-bottom:24px"><h2>Motivos / Resultados dos Contatos</h2><div style="overflow-x:auto"><table><thead><tr><th>Motivo</th>';
      for (var i = 0; i < profs.length; i++) html += '<th class="text-right">'+profs[i].profissional+'</th>';
      html += '<th class="text-right">Total</th><th style="text-align:center">%</th></tr></thead><tbody>';
      var grandTotal = dataRows.reduce(function(s,r){return s+(r.Total||0);},0);
      for (var i = 0; i < dataRows.length; i++) {
        var row = dataRows[i];
        var total = row.Total||0;
        var pct = grandTotal>0?(total/grandTotal*100).toFixed(1):0;
        html += '<tr'+(i%2===0?'':' style="background:#11131c"')+'><td style="font-weight:600">'+row.label+'</td>';
        for (var j = 0; j < profs.length; j++) html += '<td class="text-right">'+(row[profs[j].profissional]||0)+'</td>';
        html += '<td class="text-right" style="font-weight:700">'+total+'</td><td style="text-align:center"><div class="daily-pct-bar" style="height:16px"><div class="daily-pct-fill" style="width:'+Math.min(pct,100)+'%;background:#f59e0b"></div><span class="daily-pct-label" style="font-size:9px">'+pct+'%</span></div></td></tr>';
      }
      if (totalRow) {
        html += '<tr class="tot-row"><td>'+totalRow.label+'</td>';
        for (var j = 0; j < profs.length; j++) html += '<td class="text-right">'+(totalRow[profs[j].profissional]||0)+'</td>';
        html += '<td class="text-right">'+(totalRow.Total||0)+'</td><td style="text-align:center">100%</td></tr>';
      }
      html += '</tbody></table></div></div><div class="chart-box"><h2>Distribuição dos Motivos</h2><canvas id="chartMotivos" style="max-height:340px"></canvas></div>';
      document.getElementById('dashContent').innerHTML = html;
      setTimeout(function() {
        try {
          var labels = dataRows.map(function(r){return r.label;});
          var valores = dataRows.map(function(r){return r.Total||0;});
          new Chart(document.getElementById('chartMotivos'), {type:'doughnut', data:{labels:labels, datasets:[{data:valores,backgroundColor:['#f59e0b','#34d399','#ef4444','#a78bfa','#60a5fa','#f97316','#ec4899'],borderColor:'#0b0d14',borderWidth:2}]}, options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#9ca3af',padding:16,boxWidth:12}},tooltip:{backgroundColor:'#1e1b4b',titleColor:'#fcd34d',bodyColor:'#e1e7ef',borderColor:'#f59e0b',borderWidth:1}}}});
        } catch(e) {}
      }, 50);
    }


  </script>
</body>
